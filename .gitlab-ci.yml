image: macos-14-xcode-15

stages:
  - build

build_ios:
  stage: build
  tags:
    - saas-macos-medium-m1
  script:
    - npm install
    - npm run build
    # These two lines replace 'npx cap edit' for a cloud server:
    - npx cap sync ios
    - npx cap update ios
    
    # Build Command
    - xcodebuild -workspace ios/App/App.xcworkspace 
      -scheme App 
      -configuration Release 
      -sdk iphoneos 
      CODE_SIGNING_ALLOWED=NO 
      CODE_SIGNING_REQUIRED=NO 
      -derivedDataPath build-output

    # Packaging
    - cd build-output/Build/Products/Release-iphoneos
    - mkdir -p Payload
    - cp -R App.app Payload/
    - zip -qry SurreyISOC.ipa Payload
  artifacts:
    paths:
      - build-output/Build/Products/Release-iphoneos/SurreyISOC.ipa