name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and Package iOS App
        run: |
          # 1. Find the workspace file
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          echo "Found workspace at: $WORKSPACE_PATH"
          
          # 2. Build the app using Release configuration
          # We disable signing here so GitHub can finish the build, 
          # but we keep the structure intact for SideStore.
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_ALLOWED=NO \
            -derivedDataPath build-output

          # 3. Navigate to the build folder
          cd build-output/Build/Products/Release-iphoneos
          
          # 4. Create the Payload folder (Required for .ipa)
          mkdir -p Payload
          
          # 5. Copy the app bundle into Payload
          cp -R App.app Payload/
          
          # 6. Package into IPA 
          # -y is CRITICAL to preserve symlinks; -r is for recursive
          zip -qry SurreyISOC.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: SurreyISOC-App
          path: build-output/Build/Products/Release-iphoneos/SurreyISOC.ipa
          retention-days: 7