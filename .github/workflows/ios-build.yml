name: Build iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and Package iOS App
        run: |
          # 1. Find the workspace file no matter where it is hiding (The Detective)
          WORKSPACE_PATH=$(find . -name "project.xcworkspace" | head -n 1)
          echo "Found workspace at: $WORKSPACE_PATH"
          
          # 2. Build the app and force it to output into a folder called 'build-output'
          xcodebuild -workspace "$WORKSPACE_PATH" -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO -derivedDataPath build-output
          
          # 3. Navigate into that specific output folder
          cd build-output/Build/Products/Debug-iphoneos
          
          # 4. Create the Payload folder and copy the app inside
          mkdir -p Payload
          cp -R App.app Payload/
          
          # 5. Zip it securely into an IPA (Preserving Apple's execution permissions!)
          zip -qr SurreyISOC.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: SurreyISOC-App
          # Point directly to the newly zipped IPA
          path: build-output/Build/Products/Debug-iphoneos/SurreyISOC.ipa