name: Build iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and Package iOS App
        # We tell the Mac exactly where the Xcode project is
        working-directory: ios/App
        run: |
          # 1. Build the raw app
          xcodebuild -workspace project.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO
          
          # 2. Navigate to where Xcode put the finished app
          cd build/Debug-iphoneos
          
          # 3. Create the Payload folder and move the app inside
          mkdir -p Payload
          cp -R App.app Payload/
          
          # 4. Zip it securely into an IPA (This preserves the Apple permissions!)
          zip -qr SurreyISOC.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: SurreyISOC-App
          # Upload the perfectly packaged file
          path: ios/App/build/Debug-iphoneos/SurreyISOC.ipa