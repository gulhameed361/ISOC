name: Build iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS Project (Signing Bypass)
        run: |
          # This command finds where the .xcworkspace is and enters that folder
          cd $(find . -name "*.xcworkspace" -exec dirname {} \;)
          
          # Now we run the build in the correct spot
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO 
          
          # Create a build folder we can easily find for the upload step
          mkdir -p ../../build-output
          cp -R build/Debug-iphoneos/App.app ../../build-output/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-debug
          path: build-output/App.app