name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync and Copy Capacitor
        run: |
          npx cap sync ios
          npx cap copy ios
          npx cap update ios

      - name: Build and Package iOS App
        run: |
          # Automatically find the workspace file anywhere in the project
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -n 1)
          echo "Found workspace at: $WORKSPACE_PATH"
          
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_ALLOWED=NO \
            -derivedDataPath build-output

          cd build-output/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R *.app Payload/
          zip -qry SurreyISOC.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: SurreyISOC-App
          path: build-output/Build/Products/Release-iphoneos/SurreyISOC.ipa