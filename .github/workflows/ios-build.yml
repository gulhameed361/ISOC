name: Build iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS Project (Signing Bypass)
        run: |
          # Find the workspace file no matter where it is hiding
          WORKSPACE_PATH=$(find . -name "project.xcworkspace" | head -n 1)
          echo "Found workspace at: $WORKSPACE_PATH"
          
          # Run the build using that found path
          xcodebuild -workspace "$WORKSPACE_PATH" -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO -derivedDataPath build-output

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-debug
          # This path matches the 'derivedDataPath' we set above
          path: build-output/Build/Products/Debug-iphoneos/App.app