name: Build iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS Project (Signing Bypass)
        run: |
          # We enter the iOS folder and run a direct Xcode build command
          # CODE_SIGNING_ALLOWED=NO is the "magic" part that stops the crash
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-debug
          # This path points to the raw compiled app folder
          path: ios/App/build/Debug-iphoneos/App.app