# GitLab-CI for Capacitor iOS Build
image: macos-14-xcode-15

stages:
  - build

variables:
  # This prevents Homebrew from wasting time updating during your build
  HOMEBREW_NO_AUTO_UPDATE: "1"

build_ios_app:
  stage: build
  tags:
    - saas-macos-medium-m1  # This tells GitLab to use a Mac runner
  script:
    - node -v
    - npm install
    - npm run build
    - npx cap sync ios
    - npx cap update ios
    
    # Build the iOS Workspace
    - xcodebuild -workspace ios/App/App.xcworkspace 
      -scheme App 
      -configuration Release 
      -sdk iphoneos 
      CODE_SIGNING_ALLOWED=NO 
      CODE_SIGNING_REQUIRED=NO 
      -derivedDataPath build-output

    # Prepare the Payload for SideStore
    - cd build-output/Build/Products/Release-iphoneos
    - mkdir -p Payload
    - cp -R App.app Payload/
    - zip -qry SurreyISOC.ipa Payload

  artifacts:
    paths:
      - build-output/Build/Products/Release-iphoneos/SurreyISOC.ipa
    expire_in: 1 week